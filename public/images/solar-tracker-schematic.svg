<svg viewBox="0 0 900 1200" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1b4f72"/>
    </marker>
    <marker id="dot" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="5" markerHeight="5">
      <circle cx="4" cy="4" r="3" fill="#12151a"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d8d5cc" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- sheet -->
  <rect width="900" height="1200" fill="#f5f3ee"/>
  <rect x="40" y="40" width="820" height="1120" fill="url(#grid)" stroke="#12151a" stroke-width="2"/>

  <!-- sun path -->
  <path d="M 110 320 Q 430 60 800 240" fill="none" stroke="#8b8d93" stroke-width="1.5" stroke-dasharray="7 7"/>
  <text x="118" y="298" fill="#8b8d93" font-size="16" letter-spacing="1">SUN PATH (E→W)</text>

  <!-- sun -->
  <g stroke="#e8a93d" stroke-width="2.5">
    <circle cx="700" cy="155" r="32" fill="none"/>
    <line x1="700" y1="101" x2="700" y2="81"/>
    <line x1="700" y1="209" x2="700" y2="229"/>
    <line x1="646" y1="155" x2="626" y2="155"/>
    <line x1="754" y1="155" x2="774" y2="155"/>
    <line x1="662" y1="117" x2="648" y2="103"/>
    <line x1="738" y1="117" x2="752" y2="103"/>
    <line x1="662" y1="193" x2="648" y2="207"/>
    <line x1="738" y1="193" x2="752" y2="207"/>
  </g>

  <!-- incident rays (kept clear of labels) -->
  <g stroke="#e8a93d" stroke-width="1.3" stroke-dasharray="4 6">
    <line x1="668" y1="190" x2="350" y2="364"/>
    <line x1="695" y1="205" x2="430" y2="346"/>
  </g>

  <!-- LDR sensor block on panel top edge -->
  <g transform="rotate(-12 563 307)">
    <rect x="548" y="296" width="30" height="22" fill="#f5f3ee" stroke="#12151a" stroke-width="1.8"/>
    <circle cx="556" cy="303" r="2.2" fill="#12151a"/>
    <circle cx="570" cy="303" r="2.2" fill="#12151a"/>
    <circle cx="556" cy="312" r="2.2" fill="#12151a"/>
    <circle cx="570" cy="312" r="2.2" fill="#12151a"/>
  </g>
  <line x1="582" y1="294" x2="614" y2="266" stroke="#12151a" stroke-width="1" marker-start="url(#dot)"/>
  <text x="620" y="258" fill="#12151a" font-size="17" letter-spacing="1">LDR ARRAY (×4)</text>

  <!-- signal wire: sensors → controller on mast (right of panel, clear of labels) -->
  <path d="M 600 318 C 790 430 780 620 524 640" fill="none" stroke="#8b8d93" stroke-width="1.3" stroke-dasharray="3 5"/>

  <!-- PV panel: A(237,388) B(577,312) C(663,472) D(323,548), centered on mast axis x=450 -->
  <polygon points="237,388 577,312 663,472 323,548" fill="#eae7df" stroke="#12151a" stroke-width="2.5"/>
  <!-- cell grid -->
  <g stroke="#2e6da4" stroke-width="1.2">
    <line x1="322" y1="369" x2="408" y2="529"/>
    <line x1="407" y1="350" x2="493" y2="510"/>
    <line x1="492" y1="331" x2="578" y2="491"/>
    <line x1="266" y1="441" x2="606" y2="365"/>
    <line x1="294" y1="495" x2="634" y2="419"/>
  </g>
  <!-- panel thickness -->
  <polygon points="323,548 663,472 669,486 329,562" fill="#12151a"/>

  <!-- mount strut: panel underside → pivot, on center axis -->
  <line x1="450" y1="524" x2="450" y2="551" stroke="#12151a" stroke-width="6"/>

  <line x1="433" y1="571" x2="240" y2="640" stroke="#12151a" stroke-width="1" marker-start="url(#dot)"/>
  <text x="63" y="662" fill="#12151a" font-size="17" letter-spacing="1">GEARMOTOR @ PIVOT</text>

  <!-- elevation pivot, centered under panel -->
  <circle cx="450" cy="565" r="16" fill="#f5f3ee" stroke="#12151a" stroke-width="2.5"/>
  <circle cx="450" cy="565" r="4.5" fill="#12151a"/>

  <!-- elevation arc: right of pivot, clear of panel -->
  <path d="M 498 552 A 48 48 0 0 0 464 519" fill="none" stroke="#1b4f72" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="516" y="586" fill="#1b4f72" font-size="17" letter-spacing="1">ELEVATION</text>
  <text x="516" y="608" fill="#1b4f72" font-size="17" letter-spacing="1">0–90°</text>

  <!-- azimuth turntable (drawn before mast so mast sockets into it) -->
  <ellipse cx="450" cy="858" rx="120" ry="32" fill="#eae7df" stroke="#12151a" stroke-width="2.5"/>
  <ellipse cx="450" cy="845" rx="120" ry="32" fill="#f5f3ee" stroke="#12151a" stroke-width="2.5"/>

  <!-- mast: inserted into turntable center -->
  <rect x="436" y="581" width="28" height="264" fill="#eae7df" stroke="#12151a" stroke-width="2.5"/>
  <!-- socket collar at the joint -->
  <ellipse cx="450" cy="845" rx="24" ry="8" fill="#eae7df" stroke="#12151a" stroke-width="2"/>
  <line x1="436" y1="760" x2="300" y2="800" stroke="#12151a" stroke-width="1" marker-start="url(#dot)"/>
  <text x="86" y="820" fill="#12151a" font-size="17" letter-spacing="1">STRUCTURAL MOUNT</text>

  <!-- arduino controller, mounted on mast near the top -->
  <rect x="466" y="620" width="54" height="34" fill="#f5f3ee" stroke="#12151a" stroke-width="2"/>
  <rect x="475" y="628" width="18" height="12" fill="none" stroke="#12151a" stroke-width="1.2"/>
  <line x1="490" y1="656" x2="330" y2="740" stroke="#12151a" stroke-width="1" marker-start="url(#dot)"/>
  <text x="95" y="762" fill="#12151a" font-size="17" letter-spacing="1">ARDUINO CONTROLLER</text>

  <!-- azimuth rotation arc, below turntable -->
  <path d="M 300 885 A 160 42 0 0 0 600 885" fill="none" stroke="#1b4f72" stroke-width="2" stroke-dasharray="6 5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="118" y="872" fill="#1b4f72" font-size="17" letter-spacing="1">AZIMUTH</text>
  <text x="118" y="894" fill="#1b4f72" font-size="17" letter-spacing="1">0–360°</text>

  <!-- PV array label -->
  <line x1="237" y1="388" x2="130" y2="355" stroke="#12151a" stroke-width="1" marker-start="url(#dot)"/>
  <text x="65" y="342" fill="#12151a" font-size="17" letter-spacing="1">PV ARRAY</text>

  <!-- ══ title block ══ -->
  <g>
    <rect x="40" y="1096" width="820" height="64" fill="#f5f3ee" stroke="#12151a" stroke-width="2"/>
    <line x1="560" y1="1096" x2="560" y2="1160" stroke="#12151a" stroke-width="1.2"/>
    <line x1="740" y1="1096" x2="740" y2="1160" stroke="#12151a" stroke-width="1.2"/>
    <text x="56" y="1122" fill="#12151a" font-size="19" font-weight="bold" letter-spacing="1.5">DUAL-AXIS SOLAR TRACKER</text>
    <text x="56" y="1146" fill="#8b8d93" font-size="14" letter-spacing="1">SCHEMATIC ILLUSTRATION — NOT TO SCALE</text>
    <text x="576" y="1122" fill="#12151a" font-size="14" letter-spacing="1">J. BALCÁRCEL</text>
    <text x="576" y="1146" fill="#8b8d93" font-size="14" letter-spacing="1">JAN–APR 2025</text>
    <text x="756" y="1136" fill="#1b4f72" font-size="19" font-weight="bold" letter-spacing="1.5">FIG. 2</text>
  </g>
</svg>
